services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gloria
      POSTGRES_PASSWORD: gloria
      POSTGRES_DB: gloria_dev
    ports:
      - "5432:5432"
    volumes:
      - gloria_postgres_data:/var/lib/postgresql/data
      - ./scripts/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

volumes:
  gloria_postgres_data:
